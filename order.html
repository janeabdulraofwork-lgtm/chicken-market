<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Order Chickens</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light">
    <div class="container py-4 app">
      <div class="order-card">
        <a href="index.html">← Back</a>

        <h4 id="shopName"></h4>
        <p id="shopLocation"></p>

        <img id="shopImage" class="img-fluid rounded mb-3" />

        <hr />

        <h5>كيشا مريشكێ</h5>

        <!-- CHICKENS -->

        <!-- WEIGHT -->

        <!-- NUMBER OF CHICKENS -->

        <label class="mt-3">🐔 ژمارا مریشکا</label>

        <div class="counter">
          <button id="minusChicken">−</button>
          <span id="chickenCount">1</span>
          <button id="plusChicken">+</button>
        </div>

        <!-- WEIGHT PER CHICKEN -->

        <label class="mt-4">⚖ كيلۆ بۆ هەر مریشکەکێ(kg)</label>

        <div class="counter">
          <button id="minusWeight">−</button>
          <span id="weightCount">1</span>
          <button id="plusWeight">+</button>
        </div>

        <button class="btn btn-success w-100 mt-4" id="orderBtn">
          ✅ داخازيێ بنێرە
        </button>
      </div>
    </div>

   
    
    </div>

    <script src="order.js"></script>
  </body>
</html>
