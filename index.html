<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>Chicken Market</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="bg-light">
    <div class="container py-3 app">
      <!-- NAV BUTTONS -->

      <div class="nav-buttons">
        <a href="index.html" class="nav-btn">Home</a>
      </div>

      <!-- BANNER -->

      <img src="images/Screenshot 2026-03-10 015002.png" class="banner" />

      <!-- SEARCH -->

      <input
        id="searchInput"
        class="form-control search-bar"
        placeholder="Search for your chicken market..."
      />

      <!-- SHOP LIST -->

      <div id="shopList">
        <!-- SHOP -->

        <div class="shop-card" data-name="roost">
          <img src="images/images 1.jpg" />

          <div class="shop-info">
            <h6>الجمعة البيضاء</h6>
            <p>له زه كا</p>

            <span class="fresh">تازه و نوی</span>
          </div>

          <button
            class="order-box"
            onclick="
              openOrder(
                'الجمعة البيضاء',
                'له زه كا',
                'images/images 1.jpg',
                '9647507978490',
              )
            "
          >
            داخاز بكه
          </button>
        </div>

        <div class="shop-card" data-name="city">
          <img src="images/images 2.jpg" />

          <div class="shop-info">
            <h6>العافية</h6>
            <p>رزگاري</p>

            <span class="fresh">تازه و نوی</span>
          </div>
          <button
            class="order-box"
            onclick="
              openOrder(
                'العافية',
                'رزگاري',
                'images/images 2.jpg',
                '254798765432',
              )
            "
          >
            داخاز بكه
          </button>
        </div>

        <div class="shop-card" data-name="makina">
          <img src="images/images 3.jpg" />

          <div class="shop-info">
            <h6>گهلار</h6>
            <p>جامع ابو حكو</p>

            <span class="fresh">تازه و نوی</span>
          </div>

          <button
            class="order-box"
            onclick="
              openOrder(
                'گهلار',
                'جامع ابو حكو',
                'images/images 3.jpg',
                '254798765432',
              )
            "
          >
            داخاز بكه
          </button>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
